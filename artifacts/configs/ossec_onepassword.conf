<!--
  ossec_onepassword.conf
  ─────────────────────────────────────────────────────────────────────────────
  1Password Events API wodle block for ossec.conf

  This is the only ossec.conf entry needed for the entire integration.
  All three event streams (audit events, sign-in attempts, item usage) are
  managed internally by run.sh and onepassword.py — a single wodle block
  drives all of them.

  INTEGRATION INTO ossec.conf
  ───────────────────────────
  Add the <wodle> block below inside the <ossec_config> element of:
    /var/ossec/etc/ossec.conf        (manager / single-node)
    /var/ossec/etc/ossec.conf        (agent, if running the wodle on an agent)

  After adding the block:
    systemctl restart wazuh-manager

  INTERVAL GUIDANCE
  ─────────────────
  300 seconds (5 minutes) is the recommended production interval.

  The 1Password Events API rate limits are per-minute and per-hour.
  At a 300-second interval, each run makes at most 3 initial requests
  (one per stream) plus pagination requests. Well within rate limits.

  Minimum practical interval: 60 seconds.
  Below that, cursor-based pagination may not have new events available.

  TIMEOUT GUIDANCE
  ────────────────
  120 seconds covers catch-up scenarios where a large number of events
  need to be paginated through (e.g., after an extended outage). In
  practice, a healthy integration running every 5 minutes should complete
  in well under 10 seconds.
  ─────────────────────────────────────────────────────────────────────────────
-->

<wodle name="command">
  <disabled>no</disabled>
  <tag>onepassword</tag>
  <command>/var/ossec/wodles/onepassword/run.sh</command>
  <interval>5m</interval>
  <ignore_output>no</ignore_output>
  <run_on_start>yes</run_on_start>
  <timeout>120</timeout>
</wodle>
